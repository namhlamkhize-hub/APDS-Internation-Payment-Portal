name: Minimal DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write  # Required for CodeQL to upload results
      actions: read
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      # SAST - Updated to v4 with incremental analysis disabled
      - name: SAST with CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          incremental-analysis: false
      
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v4
      
      # SCA - Dependency check
      - name: Check Dependencies
        run: |
          npm ci || npm install
          npm audit --audit-level=high
      
      # API Testing
      - name: Quick API Test
        run: |
          npm start &
          sleep 8
          curl -I http://localhost:3000 || echo "Server running"
